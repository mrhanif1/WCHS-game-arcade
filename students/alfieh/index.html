<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cyber Escape Room - System Architecture</title>
  <style>
    body{font-family:Arial,sans-serif;margin:0;background:#f8fbff;color:#111827;display:flex;min-height:100vh;align-items:center;justify-content:center;padding:18px}
    .game{max-width:820px;width:100%;background:white;border:3px solid #bfdbfe;border-radius:24px;padding:24px;box-shadow:0 20px 50px rgba(37,99,235,.18)}
    .top{display:flex;gap:10px;flex-wrap:wrap;justify-content:space-between;align-items:center;margin-bottom:16px}.badge{background:#dbeafe;color:#1e40af;border-radius:999px;padding:8px 12px;font-weight:bold}.alarm{background:#fee2e2;color:#991b1b}h1{font-size:34px;margin:0 0 8px;color:#1d4ed8}h2{font-size:28px;margin:12px 0}.story{font-size:20px;line-height:1.35;background:#f1f5f9;border-radius:16px;padding:14px;margin:12px 0}.answers{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}button{font-size:20px;font-weight:bold;border:0;border-radius:14px;padding:16px;cursor:pointer;background:#2563eb;color:white}button:hover{background:#1d4ed8}.answer{background:#eff6ff;color:#111827;border:2px solid #93c5fd}.answer:hover{background:#dbeafe}.feedback{font-size:20px;font-weight:bold;margin-top:14px;min-height:54px}.good{color:#15803d}.bad{color:#b91c1c}.hidden{display:none}.progress{height:16px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin:14px 0}.bar{height:100%;background:#22c55e;width:0}.small{font-size:16px;color:#4b5563}@media(max-width:650px){.answers{grid-template-columns:1fr}h1{font-size:28px}h2{font-size:24px}button{font-size:18px}}
  </style>
</head>
<body>
  <main class="game">
    <div class="top"><span class="badge">🔐 Access keys: <span id="score">0</span></span><span class="badge alarm">🚨 Alarm: <span id="alarm">0</span></span><span class="badge">Door <span id="door">1</span>/8</span></div>
    <h1>Cyber Escape Room</h1>
    <p class="story" id="story">You are trapped in a locked server room. Answer GCSE System Architecture questions to collect access keys and escape before the alarm reaches 3.</p>
    <div id="startScreen"><button onclick="startGame()">Start Escape</button><p class="small">Topic: OCR GCSE Computer Science 1.1 System Architecture</p></div>
    <section id="gameScreen" class="hidden"><div class="progress"><div class="bar" id="bar"></div></div><h2 id="question"></h2><div class="answers" id="answers"></div><p class="feedback" id="feedback"></p><button id="nextBtn" class="hidden" onclick="nextQuestion()">Next Lock</button></section>
    <section id="endScreen" class="hidden"><h2 id="endTitle"></h2><p class="story" id="endText"></p><button onclick="restartGame()">Restart</button></section>
  </main>
<script>
const questions=[
 {q:'Which part of the CPU performs arithmetic and logic operations?',a:['ALU','Control Unit','RAM','Hard drive'],c:0,f:'The ALU handles calculations and logical comparisons.'},
 {q:'What does the Control Unit do?',a:['Directs the flow of instructions inside the CPU','Stores files permanently','Displays images','Connects to Wi-Fi'],c:0,f:'The Control Unit coordinates the fetch-decode-execute cycle.'},
 {q:'Why is cache memory used?',a:['To store frequently used data close to the CPU','To save photos permanently','To replace the operating system','To increase screen brightness'],c:0,f:'Cache is very fast memory near the CPU, so it speeds up access.'},
 {q:'What does clock speed measure?',a:['How many cycles per second the CPU can perform','How much storage a computer has','The size of the monitor','How fast the internet is'],c:0,f:'Clock speed is measured in Hz and relates to CPU cycles per second.'},
 {q:'What is the purpose of the Program Counter?',a:['It stores the address of the next instruction','It stores the final answer only','It controls the keyboard','It stores images'],c:0,f:'The Program Counter points to the next instruction to fetch.'},
 {q:'Which statement about cores is correct?',a:['More cores can help run tasks in parallel','More cores always make every program twice as fast','Cores are the same as hard drives','Cores store files permanently'],c:0,f:'Multiple cores can process different tasks at the same time, if software can use them.'},
 {q:'What is an embedded system?',a:['A computer built into another device for a specific purpose','A laptop with extra RAM','A computer used only for gaming','A computer without software'],c:0,f:'Embedded systems are built into devices such as washing machines, cars or microwaves.'},
 {q:'What happens during the fetch stage?',a:['The CPU gets the next instruction from memory','The CPU prints a document','The CPU deletes the operating system','The CPU sends an email'],c:0,f:'During fetch, the CPU retrieves the next instruction from memory.'}
];
let current=0, score=0, alarm=0, answered=false;
function startGame(){document.getElementById('startScreen').classList.add('hidden');document.getElementById('gameScreen').classList.remove('hidden');showQuestion();}
function showQuestion(){answered=false;let item=questions[current];document.getElementById('question').textContent=item.q;document.getElementById('door').textContent=current+1;document.getElementById('feedback').textContent='';document.getElementById('nextBtn').classList.add('hidden');document.getElementById('bar').style.width=(current/questions.length*100)+'%';let box=document.getElementById('answers');box.innerHTML='';item.a.forEach((txt,i)=>{let b=document.createElement('button');b.className='answer';b.textContent=txt;b.onclick=()=>checkAnswer(i);box.appendChild(b);});}
function checkAnswer(i){if(answered)return;answered=true;let item=questions[current];let fb=document.getElementById('feedback');if(i===item.c){score++;fb.textContent='✅ Access key collected! '+item.f;fb.className='feedback good';}else{alarm++;fb.textContent='❌ Alarm increased. '+item.f;fb.className='feedback bad';}document.getElementById('score').textContent=score;document.getElementById('alarm').textContent=alarm;document.getElementById('nextBtn').classList.remove('hidden');if(alarm>=3){endGame(false);}}
function nextQuestion(){current++;if(current>=questions.length){endGame(true)}else{showQuestion();}}
function endGame(finished){document.getElementById('gameScreen').classList.add('hidden');document.getElementById('endScreen').classList.remove('hidden');document.getElementById('bar').style.width='100%';let title=document.getElementById('endTitle'), text=document.getElementById('endText');if(finished && score>=6){title.textContent='🎉 Escaped!';text.textContent=`You escaped with ${score} access keys. Strong knowledge of system architecture.`;}else if(finished){title.textContent='Almost escaped';text.textContent=`You collected ${score} keys. Replay to improve your CPU knowledge.`;}else{title.textContent='Locked down!';text.textContent='The alarm reached 3. Revise the feedback and try again.';}}
function restartGame(){current=0;score=0;alarm=0;document.getElementById('score').textContent=0;document.getElementById('alarm').textContent=0;document.getElementById('endScreen').classList.add('hidden');document.getElementById('startScreen').classList.remove('hidden');}
</script>
</body>
</html>
