<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tung Tung Tung Sahur Obby</title>

<style>
body{
margin:0;
overflow:hidden;
background:#87CEEB;
font-family:Arial;
}

canvas{
display:block;
margin:auto;
background:#66ccff;
border:4px solid black;
}

#questionBox{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
display:none;
border:4px solid black;
text-align:center;
width:350px;
}

button{
display:block;
margin:10px auto;
padding:10px;
font-size:16px;
width:90%;
}
</style>

</head>

<body>

<canvas id="game" width="900" height="500"></canvas>

<div id="questionBox">
<h2 id="question"></h2>
<div id="answers"></div>
</div>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const player={
x:40,
y:420,
w:30,
h:30,
dx:0,
dy:0,
ground:false
};

const gravity=.7;

const keys={};

document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

const platforms=[
{x:0,y:450,w:180,h:50},
{x:260,y:390,w:120,h:20},
{x:470,y:330,w:120,h:20},
{x:650,y:260,w:120,h:20},
{x:820,y:180,w:80,h:20}
];

const lava={
x:180,
y:470,
w:640,
h:30
};

const finish={
x:840,
y:120,
w:40,
h:60
};

const questions=[
{
q:"Who is the goal in Steal a Brainrot?",
a:["Collect hats","Steal brainrots","Mine diamonds","Fishing"],
c:1
},
{
q:"What does LAN stand for?",
a:["Long Area Network","Large Area Number","Local Area Network","Link Area Node"],
c:2
},
{
q:"Which device connects different networks?",
a:["Router","Keyboard","Printer","Monitor"],
c:0
}
];

let questionIndex=0;

function askQuestion(){

if(questionIndex>=questions.length)return;

const box=document.getElementById("questionBox");
const q=document.getElementById("question");
const ans=document.getElementById("answers");

box.style.display="block";

q.innerHTML=questions[questionIndex].q;

ans.innerHTML="";

questions[questionIndex].a.forEach((text,i)=>{

const b=document.createElement("button");

b.innerHTML=text;

b.onclick=function(){

if(i===questions[questionIndex].c){

alert("Correct!");

questionIndex++;

box.style.display="none";

}else{

alert("WRONG! TUNG BONK!");

player.x=40;
player.y=420;
box.style.display="none";

}

}

ans.appendChild(b);

});

}

function reset(){

player.x=40;
player.y=420;

}

function update(){

if(document.getElementById("questionBox").style.display=="block") return;

player.dx=0;

if(keys["ArrowLeft"])player.dx=-5;
if(keys["ArrowRight"])player.dx=5;

if((keys[" "]||keys["ArrowUp"])&&player.ground){

player.dy=-14;
player.ground=false;

}

player.dy+=gravity;

player.x+=player.dx;
player.y+=player.dy;

player.ground=false;

for(let p of platforms){

if(player.x<p.x+p.w &&
player.x+player.w>p.x &&
player.y+player.h>p.y &&
player.y+player.h<p.y+20 &&
player.dy>=0){

player.y=p.y-player.h;
player.dy=0;
player.ground=true;

}

}

if(player.y>500)reset();

if(player.x<lava.x+lava.w &&
player.x+player.w>lava.x &&
player.y+player.h>lava.y){

alert("TUNG TUNG TUNG SAHUR!");

reset();

}

if(player.x>300&&questionIndex==0)askQuestion();

if(player.x>550&&questionIndex==1)askQuestion();

if(player.x>760&&questionIndex==2)askQuestion();

if(player.x+player.w>finish.x &&
player.y<finish.y+finish.h &&
questionIndex>=3){

alert("🏏 YOU WON THE ORIGINAL TUNG BAT!");

reset();

}

}

function draw(){

ctx.clearRect(0,0,900,500);

ctx.fillStyle="green";

for(let p of platforms){

ctx.fillRect(p.x,p.y,p.w,p.h);

}

ctx.fillStyle="red";

ctx.fillRect(lava.x,lava.y,lava.w,lava.h);

ctx.fillStyle="gold";

ctx.fillRect(finish.x,finish.y,finish.w,finish.h);

ctx.fillStyle="black";

ctx.fillText("🏏 BAT",finish.x-5,finish.y-10);

ctx.fillStyle="blue";

ctx.fillRect(player.x,player.y,player.w,player.h);

}

function gameLoop(){

update();

draw();

requestAnimationFrame(gameLoop);

}

gameLoop();

</script>

</body>
</html>
