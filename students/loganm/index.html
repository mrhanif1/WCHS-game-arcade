<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini Monster Battle GCSE Edition</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#8fd3ff;
    text-align:center;
    margin:0;
}

#game{
    width:650px;
    margin:30px auto;
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0 0 15px rgba(0,0,0,0.3);
}

.monsters{
    display:flex;
    justify-content:space-around;
    margin:20px;
}

.card{
    width:220px;
    background:#eee;
    padding:15px;
    border-radius:10px;
}

.health{
    height:20px;
    background:red;
    border-radius:10px;
    overflow:hidden;
}

.bar{
    height:100%;
    background:limegreen;
    width:100%;
}

button{
    padding:10px 20px;
    margin:10px;
    font-size:16px;
    cursor:pointer;
}

#quiz{
    display:none;
    margin-top:20px;
    background:#ffffcc;
    padding:20px;
    border-radius:10px;
}

#log{
    margin-top:15px;
    min-height:40px;
    font-weight:bold;
}
</style>
</head>

<body>

<div id="game">

<h1>Mini Monster Battle</h1>

<div class="monsters">

<div class="card">
<h2>Your Monster</h2>
<h1>🦎</h1>

<div class="health">
<div id="playerBar" class="bar"></div>
</div>

<p>HP: <span id="playerHP"></span></p>

</div>

<div class="card">
<h2>Wild Monster</h2>
<h1>👾</h1>

<div class="health">
<div id="enemyBar" class="bar"></div>
</div>

<p>HP: <span id="enemyHP"></span></p>

</div>

</div>

<button onclick="attack()">Attack</button>
<button onclick="heal()">Heal</button>

<div id="log"></div>

<div id="quiz">

<h2>You Lost!</h2>

<p>Answer this GCSE Computer Science question to continue.</p>

<h3 id="question"></h3>

<div id="answers"></div>

</div>

</div>

<script>

let playerHP=100;
let enemyHP=100;

const questions=[

{
q:"What does CPU stand for?",
a:["Central Processing Unit","Computer Personal Unit","Central Program Utility","Computer Processing Utility"],
c:0
},

{
q:"Which memory is volatile?",
a:["RAM","ROM","SSD","Hard Drive"],
c:0
},

{
q:"What does LAN stand for?",
a:["Local Area Network","Large Access Network","Long Area Node","Local Access Node"],
c:0
},

{
q:"Binary uses which two digits?",
a:["0 and 1","1 and 2","2 and 3","5 and 6"],
c:0
},

{
q:"Which storage is magnetic?",
a:["Hard Disk Drive","DVD","USB Flash Drive","SSD"],
c:0
},

{
q:"What is an algorithm?",
a:[
"A step-by-step set of instructions",
"A programming language",
"A type of computer",
"A storage device"
],
c:0
}

];

updateBars();

function updateBars(){

document.getElementById("playerHP").innerHTML=playerHP;
document.getElementById("enemyHP").innerHTML=enemyHP;

document.getElementById("playerBar").style.width=playerHP+"%";
document.getElementById("enemyBar").style.width=enemyHP+"%";

}

function attack(){

let dmg=Math.floor(Math.random()*20)+10;
enemyHP-=dmg;

if(enemyHP<0) enemyHP=0;

document.getElementById("log").innerHTML=
"You dealt "+dmg+" damage!";

updateBars();

if(enemyHP<=0){

document.getElementById("log").innerHTML=
"You won! A new enemy appears!";

setTimeout(resetBattle,1500);

return;
}

enemyTurn();

}

function heal(){

let amount=Math.floor(Math.random()*15)+10;

playerHP+=amount;

if(playerHP>100)
playerHP=100;

document.getElementById("log").innerHTML=
"You healed "+amount+" HP.";

updateBars();

enemyTurn();

}

function enemyTurn(){

setTimeout(function(){

let dmg=Math.floor(Math.random()*18)+8;

playerHP-=dmg;

if(playerHP<0) playerHP=0;

document.getElementById("log").innerHTML+="<br>Enemy dealt "+dmg+" damage.";

updateBars();

if(playerHP<=0){

showQuiz();

}

},600);

}

function resetBattle(){

playerHP=100;
enemyHP=100;

updateBars();

}

function showQuiz(){

document.getElementById("quiz").style.display="block";

let question=
questions[Math.floor(Math.random()*questions.length)];

window.currentQuestion=question;

document.getElementById("question").innerHTML=question.q;

let html="";

question.a.forEach((answer,index)=>{

html+=`<button onclick="answer(${index})">${answer}</button><br><br>`;

});

document.getElementById("answers").innerHTML=html;

}

function answer(choice){

if(choice===currentQuestion.c){

alert("Correct! Battle restarts!");

document.getElementById("quiz").style.display="none";

resetBattle();

document.getElementById("log").innerHTML="";

}

else{

alert("Incorrect! Try another GCSE question.");

showQuiz();

}

}

</script>

</body>
</html>

}
