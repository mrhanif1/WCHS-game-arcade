<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mini Monster Battle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#180f2b;
    --card:#241a3d;
    --card2:#2f2350;
    --line:#3d2e63;
    --gold:#d9a441;
    --gold-dim:#8a6a2c;
    --ember:#ff6b45;
    --cream:#f3e7d0;
    --dim:#b8a9d6;
    --hp:#49b578;
    --hp-low:#d9534f;
    --xp:#5b8dee;
    --enemy:#d9534f;
    --boss:#c2185b;
    --boss-glow:#ff2e63;
    --stat:#7c5cff;
    --bonus:#2fbf9f;
    --danger:#e0524a;
    --r-common:#b8a9d6;
    --r-uncommon:#49b578;
    --r-rare:#5b8dee;
    --r-epic:#a855f7;
    --r-legendary:#d9a441;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:'Inter',Arial,sans-serif;
    background:
      radial-gradient(circle at 20% 10%, #2a1c4a 0%, transparent 45%),
      radial-gradient(circle at 85% 80%, #1f2f5a 0%, transparent 40%),
      var(--bg);
    color:var(--cream);
    min-height:100vh;
    padding:24px 12px;
  }
  #game{
    position:relative;
    max-width:760px;
    margin:0 auto;
    background:linear-gradient(180deg,var(--card),var(--card2));
    border:1px solid var(--line);
    border-radius:16px;
    padding:24px 28px 30px;
    box-shadow:0 20px 60px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.03);
    transition:box-shadow .4s ease, border-color .4s ease;
  }
  #game.boss-mode{
    border-color:var(--boss);
    box-shadow:0 20px 60px rgba(194,24,91,.35), inset 0 1px 0 rgba(255,255,255,.03);
  }
  #resetBtn{
    position:absolute;
    top:16px;
    right:16px;
    background:rgba(224,82,74,.12);
    border:1px solid var(--danger);
    color:#ffb3ae;
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:.75rem;
    padding:7px 12px;
    border-radius:8px;
    letter-spacing:.02em;
  }
  #resetBtn:hover{background:var(--danger);color:#fff}
  h1{
    font-family:'Cinzel',serif;
    font-weight:900;
    letter-spacing:.03em;
    text-align:center;
    margin:0 0 4px;
    font-size:2rem;
    color:var(--gold);
    text-shadow:0 2px 12px rgba(217,164,65,.25);
  }
  .sub{
    text-align:center;
    color:var(--dim);
    font-size:.85rem;
    margin:0 0 20px;
    letter-spacing:.08em;
    text-transform:uppercase;
  }
  .row{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:6px}
  .statline{font-size:.95rem;color:var(--dim)}
  .statline b{color:var(--cream)}
  .gold-badge{
    display:inline-flex;align-items:center;gap:6px;
    background:rgba(217,164,65,.12);
    border:1px solid var(--gold-dim);
    color:var(--gold);
    padding:4px 12px;
    border-radius:999px;
    font-weight:600;
    font-size:.9rem;
  }
  .bar{background:#140c26;height:16px;border-radius:8px;overflow:hidden;border:1px solid var(--line);margin:4px 0 14px}
  .bar .fill{height:100%;transition:width .35s ease}
  .fill.hp{background:linear-gradient(90deg,var(--hp),#7fe0a4)}
  .fill.hp.low{background:linear-gradient(90deg,var(--hp-low),#f08a86)}
  .fill.xp{background:linear-gradient(90deg,var(--xp),#8fb4f5)}
  .fill.enemy{background:linear-gradient(90deg,var(--enemy),#f08a86)}
  .fill.boss{background:linear-gradient(90deg,var(--boss),var(--boss-glow));}
  .bar.boss-bar{border-color:var(--boss);box-shadow:0 0 14px rgba(255,46,99,.35);animation:pulseBar 1.6s ease-in-out infinite}
  @keyframes pulseBar{0%,100%{box-shadow:0 0 8px rgba(255,46,99,.25)}50%{box-shadow:0 0 18px rgba(255,46,99,.55)}}

  .enemy-head{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
  .boss-tag{
    display:none;
    align-items:center;gap:6px;
    background:linear-gradient(90deg,var(--boss),#7a1030);
    color:#ffe1ec;
    font-family:'Cinzel',serif;
    font-weight:700;
    font-size:.72rem;
    letter-spacing:.08em;
    padding:3px 10px;
    border-radius:999px;
    text-transform:uppercase;
  }
  .boss-tag.show{display:inline-flex}
  .next-boss{font-size:.72rem;color:var(--dim);opacity:.85}

  .panel-title{
    font-family:'Cinzel',serif;
    color:var(--gold);
    font-size:1rem;
    margin:0 0 8px;
    border-bottom:1px solid var(--line);
    padding-bottom:6px;
  }
  .shop-cat{
    font-size:.7rem;
    color:var(--dim);
    text-transform:uppercase;
    letter-spacing:.1em;
    margin:14px 0 2px;
  }
  .shop-cat:first-of-type{margin-top:0}
  .moves{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:14px 0}
  button{
    font-family:'Inter',sans-serif;
    font-weight:600;
    cursor:pointer;
    border-radius:10px;
    border:1px solid var(--line);
    background:#1c1433;
    color:var(--cream);
    padding:12px 10px;
    font-size:.92rem;
    transition:transform .12s ease, border-color .12s ease, background .12s ease;
  }
  button:hover:not(:disabled){border-color:var(--gold-dim);background:#241a44;transform:translateY(-1px)}
  button:active:not(:disabled){transform:translateY(0)}
  button:disabled{opacity:.4;cursor:not-allowed}
  .move-name{display:block;font-weight:700}
  .move-desc{display:block;font-size:.72rem;color:var(--dim);margin-top:2px;font-weight:400}
  #shopToggle{
    width:100%;
    background:linear-gradient(90deg,var(--ember),#c94a2a);
    border:none;color:#1a0e08;font-family:'Cinzel',serif;font-weight:700;
    letter-spacing:.04em;padding:12px;font-size:1rem;
  }
  #shopToggle:hover:not(:disabled){filter:brightness(1.08)}

  #panelWrap{
    display:none;
    margin-top:16px;
  }
  .tabs{display:flex;gap:8px;margin-bottom:12px}
  .tab-btn{
    flex:1;
    background:#1c1433;
    border:1px solid var(--line);
    padding:10px;
    font-family:'Cinzel',serif;
    font-weight:700;
    font-size:.8rem;
    letter-spacing:.02em;
    color:var(--dim);
  }
  .tab-btn.active{
    color:#1a0e08;
    background:linear-gradient(90deg,var(--gold),#f0c675);
    border-color:var(--gold);
  }
  .tab-panel{display:none}
  .tab-panel.active{display:block}

  #stats{
    background:#150d29;
    border:1px solid var(--stat);
    border-radius:12px;
    padding:16px;
  }
  .stat-item{
    display:flex;justify-content:space-between;align-items:center;gap:12px;
    padding:12px 4px;
    border-bottom:1px solid var(--line);
  }
  .stat-item:last-child{border-bottom:none}
  .stat-item .info{flex:1}
  .stat-item .name{font-weight:700;color:var(--cream)}
  .stat-item .desc{font-size:.78rem;color:var(--dim);margin-top:2px}
  .stat-item .lvl{font-size:.72rem;color:var(--stat);margin-top:2px;font-weight:600}
  .stat-btn{
    background:var(--stat);
    color:#fff;
    border:none;
    min-width:92px;
    font-weight:700;
  }
  .stat-btn:hover:not(:disabled){filter:brightness(1.12);transform:translateY(-1px)}

  #shop{
    display:block;
    background:#150d29;
    border:1px solid var(--gold-dim);
    border-radius:12px;
    padding:16px;
    max-height:420px;
    overflow-y:auto;
  }
  .shop-item{
    display:flex;justify-content:space-between;align-items:center;gap:12px;
    padding:10px 4px;
    border-bottom:1px solid var(--line);
  }
  .shop-item:last-child{border-bottom:none}
  .shop-item .info{flex:1}
  .shop-item .name{font-weight:700;color:var(--cream)}
  .shop-item .desc{font-size:.78rem;color:var(--dim);margin-top:2px}
  .shop-item .lvl{font-size:.72rem;color:var(--gold);margin-top:2px}
  .buy-btn{
    background:var(--gold);
    color:#231604;
    border:none;
    min-width:92px;
    font-weight:700;
  }
  .buy-btn:hover:not(:disabled){filter:brightness(1.08);transform:translateY(-1px)}

  #gear{
    background:#150d29;
    border:1px solid var(--r-rare);
    border-radius:12px;
    padding:16px;
    max-height:460px;
    overflow-y:auto;
  }
  .slot-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
  .slot-box{
    background:#1c1433;
    border:1px dashed var(--line);
    border-radius:10px;
    padding:10px;
    text-align:center;
  }
  .slot-box.filled{border-style:solid}
  .slot-label{font-size:.65rem;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
  .slot-item-name{font-weight:700;font-size:.82rem;margin-bottom:6px;min-height:2.2em;display:flex;align-items:center;justify-content:center}
  .unequip-btn{
    width:100%;
    background:#2a1c46;
    border:1px solid var(--danger);
    color:#ffb3ae;
    font-size:.72rem;
    padding:6px;
  }
  .unequip-btn:hover:not(:disabled){background:var(--danger);color:#fff}
  .inv-empty{color:var(--dim);font-size:.85rem;text-align:center;padding:20px 0}
  .inv-item{
    display:flex;justify-content:space-between;align-items:center;gap:10px;
    padding:10px 8px;
    border-bottom:1px solid var(--line);
    border-left:3px solid var(--r-common);
    margin-bottom:2px;
    background:rgba(255,255,255,.02);
    border-radius:0 8px 8px 0;
  }
  .inv-item:last-child{border-bottom:none}
  .inv-item .info{flex:1}
  .inv-item .name{font-weight:700;font-size:.88rem}
  .inv-item .rarity-tag{font-size:.62rem;text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin-left:6px}
  .inv-item .desc{font-size:.75rem;color:var(--dim);margin-top:2px}
  .inv-item .slot-tag{font-size:.68rem;color:var(--dim);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
  .equip-btn{background:var(--bonus);color:#062018;border:none;min-width:80px;font-weight:700;font-size:.8rem}
  .equip-btn:hover:not(:disabled){filter:brightness(1.1);transform:translateY(-1px)}
  .equip-btn.equipped{background:var(--dim);color:#1a0e08}

  #log{
    margin-top:16px;
    background:#120b22;
    border:1px solid var(--line);
    border-radius:10px;
    padding:12px 14px;
    min-height:52px;
    font-size:.9rem;
    color:var(--dim);
    line-height:1.5;
  }
  #log b{color:var(--gold)}
  #log b.boss-text{color:var(--boss-glow)}
  #log b.wind-text{color:var(--hp)}
  #log b.dodge-text{color:var(--stat)}
  #log b.bonus-text{color:var(--bonus)}
  #log b.reset-text{color:var(--danger)}
  #log b.drop-common{color:var(--r-common)}
  #log b.drop-uncommon{color:var(--r-uncommon)}
  #log b.drop-rare{color:var(--r-rare)}
  #log b.drop-epic{color:var(--r-epic)}
  #log b.drop-legendary{color:var(--r-legendary)}
  #quiz{
    display:none;
    margin-top:16px;
    background:#150d29;
    border:1px solid var(--ember);
    border-radius:12px;
    padding:16px;
    text-align:center;
  }
  #quiz h3{font-family:'Cinzel',serif;color:var(--ember);margin:0 0 8px}
  #ans button{margin:4px}

  #bonusQuiz{
    display:none;
    margin-top:16px;
    background:#0f2a26;
    border:1px solid var(--bonus);
    border-radius:12px;
    padding:16px;
    text-align:center;
    box-shadow:0 0 18px rgba(47,191,159,.25);
  }
  #bonusQuiz h3{
    font-family:'Cinzel',serif;
    color:var(--bonus);
    margin:0 0 4px;
    text-transform:uppercase;
    letter-spacing:.04em;
  }
  #bonusQuiz .bq-sub{font-size:.78rem;color:var(--dim);margin:0 0 10px}
  #bqAns button{margin:4px}
  .flash{animation:flash .4s ease}
  @keyframes flash{0%{filter:brightness(1.6)}100%{filter:brightness(1)}}

  #bossBanner{
    display:none;
    text-align:center;
    font-family:'Cinzel',serif;
    font-weight:900;
    letter-spacing:.06em;
    color:var(--boss-glow);
    text-shadow:0 0 18px rgba(255,46,99,.5);
    font-size:1.1rem;
    margin:0 0 10px;
    text-transform:uppercase;
    animation:bannerIn .5s ease;
  }
  #bossBanner.show{display:block}
  @keyframes bannerIn{
    0%{opacity:0;transform:translateY(-6px) scale(.96)}
    100%{opacity:1;transform:translateY(0) scale(1)}
  }
</style>
</head>
<body>
<div id="game">
  <button id="resetBtn" onclick="resetGame()">&#8635; Reset</button>

  <h1>Mini Monster Battle</h1>
  <p class="sub">A tiny turn-based skirmish</p>

  <div class="row">
    <span class="statline">Level <b id="lvl"></b> &nbsp;|&nbsp; XP <b id="xp"></b>/<b id="need"></b></span>
    <span class="gold-badge">&#9830; <span id="gold"></span> gold</span>
  </div>
  <div class="bar"><div id="xpfill" class="fill xp"></div></div>

  <p class="statline">Your HP <b id="php"></b>/<b id="mhp"></b> <span id="windTag" style="display:none;color:var(--hp);font-size:.78rem">&#9889; <span id="windCount"></span> Second Wind</span></p>
  <div class="bar"><div id="pfill" class="fill hp"></div></div>

  <div id="bossBanner">&#9760; A Boss Approaches &#9760;</div>

  <div class="enemy-head">
    <p class="statline">
      <span id="bossTag" class="boss-tag">&#128128; Boss</span>
      <span id="enemyName"></span> &middot; Lv <b id="elv"></b> &nbsp; HP <b id="ehp"></b>/<b id="emhp"></b>
    </p>
    <span class="next-boss" id="nextBoss"></span>
  </div>
  <div class="bar" id="ebar"><div id="efill" class="fill enemy"></div></div>

  <div class="moves">
    <button onclick="move('scratch')" id="btnScratch">
      <span class="move-name">Scratch</span>
      <span class="move-desc" id="d-scratch"></span>
    </button>
    <button onclick="move('fire')" id="btnFire">
      <span class="move-name">Fire Blast</span>
      <span class="move-desc" id="d-fire"></span>
    </button>
    <button onclick="move('heal')" id="btnHeal">
      <span class="move-name">Heal Pulse</span>
      <span class="move-desc" id="d-heal"></span>
    </button>
    <button onclick="move('power')" id="powerBtn">
      <span class="move-name">Power Strike</span>
      <span class="move-desc" id="d-power"></span>
    </button>
  </div>

  <button id="shopToggle" onclick="togglePanel()">&#9878; Open Character Menu</button>

  <div id="panelWrap">
    <div class="tabs">
      <button class="tab-btn active" id="tabStatsBtn" onclick="switchTab('stats')">&#9876; Stats</button>
      <button class="tab-btn" id="tabShopBtn" onclick="switchTab('shop')">&#9878; Shop</button>
      <button class="tab-btn" id="tabGearBtn" onclick="switchTab('gear')">&#127890; Gear</button>
    </div>

    <div class="tab-panel active" id="tabStats">
      <div id="stats"></div>
    </div>

    <div class="tab-panel" id="tabShop">
      <div id="shop"></div>
    </div>

    <div class="tab-panel" id="tabGear">
      <div id="gear"></div>
    </div>
  </div>

  <div id="log">Your adventure begins&hellip;</div>

  <div id="bonusQuiz">
    <h3>&#127775; Wave Trial</h3>
    <p class="bq-sub">Answer correctly for a free upgrade!</p>
    <p id="bq"></p>
    <div id="bqAns"></div>
  </div>

  <div id="quiz">
    <h3>Answer to continue</h3>
    <p id="q"></p>
    <div id="ans"></div>
  </div>
</div>

<script>
const QUIZ_POOL=[
  {q:'CPU stands for?',a:['Central Processing Unit','Computer Personal Unit','Core Processor Utility','Central Program Unit'],c:0},
  {q:'RAM is best described as?',a:['Long-term storage','Short-term working memory','A type of screen','A type of cable'],c:1},
  {q:'HTML stands for?',a:['HyperText Markup Language','High Tech Modern Language','Home Tool Markup Language','HyperTransfer Machine Language'],c:0},
  {q:'What does "www" stand for?',a:['World Wide Web','World Wide Wire','Web Wide World','Wide World Web'],c:0},
  {q:'A byte is made up of how many bits?',a:['4','8','16','2'],c:1},
  {q:'Which of these is an operating system?',a:['Photoshop','Linux','Excel','Chrome'],c:1},
  {q:'What does "URL" stand for?',a:['Uniform Resource Locator','Universal Reference Link','User Response Load','Unified Recovery Line'],c:0},
  {q:'Which company created the JavaScript language?',a:['Microsoft','Netscape','Apple','IBM'],c:1},
  {q:'What does "GPU" primarily process?',a:['Sound','Graphics','Network packets','File storage'],c:1},
  {q:'A firewall is used to?',a:['Cool down a computer','Filter network traffic','Speed up the CPU','Store backups'],c:1}
];

const BOSS_EVERY = 10;   // a boss shows up after every 10 wave-clears
const BONUS_EVERY = 5;   // every 5 wave-clears, answer a question for a free upgrade
const BOSS_NAMES = [
  'Grimwald the Ashen',
  'Vex, Herald of Ruin',
  'The Hollow Sovereign',
  'Karrath Deepfang',
  'Nyxara the Unbound',
  'The Cindered Wyrm',
  'Mordrec, Last Warden'
];
const ENEMY_NAMES = ['Snarling Whelp','Marsh Stalker','Cave Skitterling','Rot Hound','Ember Imp','Fen Wraith'];

/* ---------- equipment definitions ---------- */
const RARITY_ORDER = ['common','uncommon','rare','epic','legendary'];
const RARITY_LABEL = {common:'Common',uncommon:'Uncommon',rare:'Rare',epic:'Epic',legendary:'Legendary'};

const EQUIPMENT_POOL = [
  // ---- Weapons (bonus: atk, crit, critMult) ----
  {id:'w_dagger', name:'Rusty Dagger', icon:'&#128481;', slot:'weapon', rarity:'common',
    bonuses:{atk:2}, desc:'+2 damage on every attack.'},
  {id:'w_ironsword', name:'Iron Sword', icon:'&#9876;', slot:'weapon', rarity:'uncommon',
    bonuses:{atk:4,crit:0.02}, desc:'+4 damage, +2% crit chance.'},
  {id:'w_flameblade', name:'Flameforged Blade', icon:'&#128293;', slot:'weapon', rarity:'rare',
    bonuses:{atk:7,critMult:0.1}, desc:'+7 damage, +0.1x crit damage.'},
  {id:'w_voidreaver', name:'Void Reaver', icon:'&#127993;', slot:'weapon', rarity:'epic',
    bonuses:{atk:12,crit:0.05}, desc:'+12 damage, +5% crit chance.'},
  {id:'w_dragonfang', name:'Dragonfang Edge', icon:'&#128009;', slot:'weapon', rarity:'legendary',
    bonuses:{atk:18,crit:0.05,critMult:0.2}, desc:'+18 damage, +5% crit, +0.2x crit damage.'},

  // ---- Armor (bonus: hp, armor, dodge) ----
  {id:'a_leather', name:'Leather Vest', icon:'&#128084;', slot:'armor', rarity:'common',
    bonuses:{hp:10,armor:0.01}, desc:'+10 max HP, +1% damage reduction.'},
  {id:'a_chain', name:'Chainmail', icon:'&#9malfunctionerreur;', slot:'armor', rarity:'uncommon',
    bonuses:{hp:20,armor:0.02}, desc:'+20 max HP, +2% damage reduction.'},
  {id:'a_plate', name:'Plate of Warding', icon:'&#128737;', slot:'armor', rarity:'rare',
    bonuses:{hp:35,armor:0.04}, desc:'+35 max HP, +4% damage reduction.'},
  {id:'a_aegis', name:'Aegis Bulwark', icon:'&#9974;', slot:'armor', rarity:'epic',
    bonuses:{hp:55,armor:0.06}, desc:'+55 max HP, +6% damage reduction.'},
  {id:'a_bastion', name:"Sovereign's Bastion", icon:'&#127984;', slot:'armor', rarity:'legendary',
    bonuses:{hp:80,armor:0.10,dodge:0.03}, desc:'+80 max HP, +10% reduction, +3% dodge.'},

  // ---- Trinkets (bonus: luck, heal, dodge, hybrid) ----
  {id:'t_lucky', name:'Lucky Charm', icon:'&#127808;', slot:'trinket', rarity:'common',
    bonuses:{luck:0.03}, desc:'+3% gold from victories.'},
  {id:'t_locket', name:"Healer's Locket", icon:'&#128142;', slot:'trinket', rarity:'uncommon',
    bonuses:{heal:8}, desc:'+8 Heal Pulse power.'},
  {id:'t_feather', name:"Windwalker's Feather", icon:'&#129413;', slot:'trinket', rarity:'rare',
    bonuses:{dodge:0.04}, desc:'+4% dodge chance.'},
  {id:'t_sage', name:"Sage's Amulet", icon:'&#128302;', slot:'trinket', rarity:'epic',
    bonuses:{heal:15,luck:0.05}, desc:'+15 Heal Pulse power, +5% gold gain.'},
  {id:'t_crown', name:'Crown of the Fallen King', icon:'&#128081;', slot:'trinket', rarity:'legendary',
    bonuses:{atk:8,hp:25,luck:0.08}, desc:'+8 damage, +25 max HP, +8% gold gain.'}
];
// fix the mangled icon that could break the shield glyph above
EQUIPMENT_POOL.find(i=>i.id==='a_chain').icon = '&#9993;';

function itemById(id){ return EQUIPMENT_POOL.find(i=>i.id===id); }

const NORMAL_RARITY_WEIGHTS = {common:55,uncommon:28,rare:13,epic:3.5,legendary:0.5};
const BOSS_RARITY_WEIGHTS   = {common:8, uncommon:24,rare:36,epic:24, legendary:8};

function rollRarity(weights){
  const total = Object.values(weights).reduce((a,b)=>a+b,0);
  let r = Math.random()*total;
  for(const rarity of RARITY_ORDER){
    r -= weights[rarity];
    if(r <= 0) return rarity;
  }
  return RARITY_ORDER[0];
}

function statCost(key){
  const lvl = stats[key];
  return Math.round(20 * Math.pow(1.15, lvl));
}

function buyStat(key){
  if(quizActive) return;
  const cost = statCost(key);
  if(gold < cost) return;
  gold -= cost;
  stats[key] += 1;
  if(key === 'vit'){ HP = maxHP(); }
  log(`Trained <b>${STAT_ITEMS.find(x=>x.key===key).name}</b>!`, true);
  ui();
}

function costOf(item){ return item.baseCost + up[item.key]*item.step; }

/* ---------- equipment bonus aggregation ---------- */
function equipTotals(){
  const t = {atk:0,hp:0,heal:0,crit:0,armor:0,luck:0,critMult:0,dodge:0};
  ['weapon','armor','trinket'].forEach(slot=>{
    const uid = equipped[slot];
    if(!uid) return;
    const inst = inventory.find(x=>x.uid===uid);
    if(!inst) return;
    const def = itemById(inst.id);
    if(!def) return;
    Object.keys(def.bonuses).forEach(k=>{ t[k] = (t[k]||0) + def.bonuses[k]; });
  });
  return t;
}

function critChance(){ const e=equipTotals(); return up.crit * 0.05 + stats.agi * 0.02 + e.crit; }
function critMultiplier(){ const e=equipTotals(); return 1.5 + up.focus * 0.1 + e.critMult; }
function armorReduction(){ const e=equipTotals(); return Math.min(0.6, up.armor * 0.03 + e.armor); }
function dodgeChance(){ const e=equipTotals(); return Math.min(0.5, stats.agi * 0.01 + e.dodge); }
function goldMultiplier(){ const e=equipTotals(); return 1 + up.luck * 0.1 + stats.wis * 0.02 + e.luck; }
function fireMissChance(){ return Math.max(0, 0.2 - up.swift * 0.05); }
function strBonus(){ const e=equipTotals(); return stats.str + e.atk; }
function wisHealBonus(){ const e=equipTotals(); return stats.wis * 5 + e.heal; }
function maxHP(){ const e=equipTotals(); return M + e.hp; }

function switchTab(name){
  document.getElementById('tabStats').classList.toggle('active', name==='stats');

/* ---------- stats panel ---------- */
function renderStats(){
  const el=document.getElementById('stats');
  if(document.getElementById('panelWrap').style.display!=='block') return;
  if(!document.getElementById('tabStats').classList.contains('active')) return;
  el.innerHTML='<div class="panel-title">Hero Stats</div>';
  STAT_ITEMS.forEach(item=>{
    const lvl = stats[item.key];
    const cost = statCost(item.key);
    const div=document.createElement('div');
    div.className='stat-item';
    div.innerHTML = `
      <div class="info">
        <div class="name">${item.icon} ${item.name}</div>
        <div class="desc">${item.desc}</div>
        <div class="lvl">Level: ${lvl}</div>
      </div>
    `;
    const btn=document.createElement('button');
    btn.className='stat-btn';
    btn.textContent = `Train (${cost}\u2666)`;
    btn.disabled = gold < cost || quizActive;
    btn.onclick = ()=> buyStat(item.key);
    div.appendChild(btn);
    el.appendChild(div);
  });
}

/* ---------- shop panel ---------- */
function renderShop(){
  const el=document.getElementById('shop');
  if(document.getElementById('panelWrap').style.display!=='block') return;
  if(!document.getElementById('tabShop').classList.contains('active')) return;
  el.innerHTML='<div class="panel-title">Merchant\'s Shop</div>';
  let lastCat = null;
  SHOP_ITEMS.forEach(item=>{
    if(item.cat !== lastCat){
      const catEl = document.createElement('div');
      catEl.className = 'shop-cat';
      catEl.textContent = item.cat;
      el.appendChild(catEl);
      lastCat = item.cat;
    }
    const lvlCount = up[item.key];
    const maxed = lvlCount >= item.max;
    const cost = costOf(item);
    const div=document.createElement('div');
    div.className='shop-item';
    div.innerHTML = `
      <div class="info">
        <div class="name">${item.icon} ${item.name}</div>
        <div class="desc">${item.desc}</div>
        <div class="lvl">Owned: ${lvlCount}/${item.max}</div>
      </div>
    `;
    const btn=document.createElement('button');
    btn.className='buy-btn';
    btn.textContent = maxed ? 'Maxed' : `Buy (${cost}\u2666)`;
    btn.disabled = maxed || gold < cost || quizActive;
    btn.onclick = ()=> buy(item);
    div.appendChild(btn);
    el.appendChild(div);
  });
}

function buy(item){
  if(quizActive) return;
  const cost = costOf(item);
  if(up[item.key] >= item.max || gold < cost) return;
  gold -= cost;
  up[item.key] += 1;
  item.apply();
  log(`Purchased <b>${item.name}</b>!`, true);
  ui();
}

/* ---------- gear (equipment) panel ---------- */
const SLOT_LABELS = {weapon:'Weapon', armor:'Armor', trinket:'Trinket'};

function renderGear(){
  const el=document.getElementById('gear');
  if(document.getElementById('panelWrap').style.display!=='block') return;
  if(!document.getElementById('tabGear').classList.contains('active')) return;

  el.innerHTML = '<div class="panel-title">Equipped Gear</div><div class="slot-row" id="slotRow"></div><div class="panel-title" style="margin-top:16px">Inventory</div><div id="invList"></div>';

  const slotRow = document.getElementById('slotRow');
  ['weapon','armor','trinket'].forEach(slot=>{
    const uid = equipped[slot];
    const inst = uid ? inventory.find(x=>x.uid===uid) : null;
    const def = inst ? itemById(inst.id) : null;
    const box = document.createElement('div');
    box.className = 'slot-box' + (def ? ' filled' : '');
    if(def){ box.style.borderColor = `var(--r-${def.rarity})`; }
    box.innerHTML = `
      <div class="slot-label">${SLOT_LABELS[slot]}</div>
      <div class="slot-item-name">${def ? def.icon+' '+def.name : 'Empty'}</div>
    `;
    const unBtn = document.createElement('button');
    unBtn.className = 'unequip-btn';
    unBtn.textContent = 'Unequip';
    unBtn.disabled = !def || quizActive;
    unBtn.onclick = ()=> unequip(slot);
    box.appendChild(unBtn);
    slotRow.appendChild(box);
  });

  const invList = document.getElementById('invList');
  if(inventory.length === 0){
    invList.innerHTML = '<div class="inv-empty">No equipment yet — defeat enemies for a chance to find gear.</div>';
    return;
  }

  // sort: rarity (high to low), then slot
  const sorted = [...inventory].sort((a,b)=>{
    const da=itemById(a.id), db=itemById(b.id);
    const ra = RARITY_ORDER.indexOf(da.rarity), rb = RARITY_ORDER.indexOf(db.rarity);
    if(rb !== ra) return rb - ra;
    return da.slot.localeCompare(db.slot);
  });

  sorted.forEach(inst=>{
    const def = itemById(inst.id);
    const isEquipped = equipped[def.slot] === inst.uid;
    const div = document.createElement('div');
    div.className = 'inv-item';
    div.style.borderLeftColor = `var(--r-${def.rarity})`;
    div.innerHTML = `
      <div class="info">
        <div class="name">${def.icon} ${def.name}<span class="rarity-tag" style="color:var(--r-${def.rarity})">${RARITY_LABEL[def.rarity]}</span></div>
        <div class="slot-tag">${SLOT_LABELS[def.slot]}</div>
        <div class="desc">${def.desc}</div>
      </div>
    `;
    const btn = document.createElement('button');
    btn.className = 'equip-btn' + (isEquipped ? ' equipped' : '');
    btn.textContent = isEquipped ? 'Equipped' : 'Equip';
    btn.disabled = isEquipped || quizActive;
    btn.onclick = ()=> equipItem(inst.uid);
    div.appendChild(btn);
    invList.appendChild(div);
  });
}

function equipItem(uid){
  if(quizActive) return;
  const inst = inventory.find(x=>x.uid===uid);
  if(!inst) return;
  const def = itemById(inst.id);
  const wasFull = HP >= maxHP();
  equipped[def.slot] = uid;
  if(wasFull) HP = maxHP(); // keep full-HP characters topped off if max HP just rose
  log(`Equipped <b>${def.name}</b>.`, true);
  ui();
}

function unequip(slot){
  if(quizActive) return;
  if(!equipped[slot]) return;
  const wasFull = HP >= maxHP();
  equipped[slot] = null;
  HP = Math.min(HP, maxHP());
  if(wasFull) HP = maxHP();
  log(`Unequipped item from ${SLOT_LABELS[slot]} slot.`, true);
  ui();
}

/* ---------- loot drops ---------- */
function dropEquipment(bossFight){
  const weights = bossFight ? BOSS_RARITY_WEIGHTS : NORMAL_RARITY_WEIGHTS;
  const rarity = rollRarity(weights);
  let pool = EQUIPMENT_POOL.filter(i=>i.rarity===rarity);
  if(pool.length===0) pool = EQUIPMENT_POOL;
  const def = pool[Math.floor(Math.random()*pool.length)];
  const uid = uidCounter++;
  inventory.push({uid, id:def.id});
  log(`<b class="drop-${def.rarity}">${def.icon} ${def.name} dropped!</b> (${RARITY_LABEL[def.rarity]} ${SLOT_LABELS[def.slot]})`, true);
}

function maybeDropLoot(bossFight){
  if(bossFight){
    dropEquipment(true);
    if(Math.random() < 0.25) dropEquipment(true);
  } else {
    if(Math.random() < 0.45) dropEquipment(false);
  }
}

/* ---------- reset ---------- */
function resetGame(){
  const ok = confirm('Reset your character? This wipes your level, gold, every upgrade, and all equipment — there is no undo.');
  if(!ok) return;

  localStorage.removeItem('mbsave');

  L = 1; XP = 0; N = 100; M = 100;
  gold = 0;
  up = {atk:0, hp:0, heal:0, cool:0, crit:0, armor:0, luck:0, wind:0, focus:0, swift:0};
  stats = {str:0, vit:0, agi:0, wis:0};
  inventory = [];
  equipped = {weapon:null, armor:null, trinket:null};
  uidCounter = 1;
  HP = M;
  defeats = 0;
  cool = 0;
  windCharges = 0;
  quizActive = false;

  document.getElementById('quiz').style.display = 'none';
  document.getElementById('bonusQuiz').style.display = 'none';

  eName = ENEMY_NAMES[Math.floor(Math.random()*ENEMY_NAMES.length)];
  isBoss = false;
  eL = L; eM = 80 + eL*20; eHP = eM;

  log('<b class="reset-text">Your character has been reset. A new adventure begins&hellip;</b>');
  ui();
}

/* ---------- battle ---------- */
function gain(v){
  XP += v;
  while(XP >= N){
    XP -= N; L++; N += 50; M += 20; HP = maxHP();
    log('<b>Level Up!</b>', true);
  }
  ui();
}

function newEnemy(){
  HP = maxHP();
  cool = 0;
  windCharges = up.wind;

  const nextIsBoss = defeats > 0 && defeats % BOSS_EVERY === 0;
  isBoss = nextIsBoss;

  if(isBoss){
    eL = L + 2;
    eM = 150 + eL*40;
    eName = BOSS_NAMES[Math.floor(defeats/BOSS_EVERY - 1) % BOSS_NAMES.length];
    log(`<b class="boss-text">${eName} emerges from the shadows!</b>`);
  } else {
    eL = Math.max(1, L + Math.floor(Math.random()*3) - 1);
    eM = 80 + eL*20;
    eName = ENEMY_NAMES[Math.floor(Math.random()*ENEMY_NAMES.length)];
  }
  eHP = eM;
  ui();
}

function applyIncoming(rawDamage){
  const reduced = Math.round(rawDamage * (1 - armorReduction()));
  const wouldDie = (HP - reduced) <= 0;
  if(wouldDie && windCharges > 0){
    windCharges--;
    HP = 1;
    log(`<b class="wind-text">Your Second Wind Talisman flares, keeping you standing at 1 HP!</b>`, true);
    return false; // did not actually die
  }
  HP = Math.max(0, HP - reduced);
  return HP <= 0;
}

function enemy(){
  if(eHP <= 0) return;

  if(Math.random() < dodgeChance()){
    log(`<b class="dodge-text">You dodge the attack!</b>`, true);
    ui();
    return;
  }

  let d = 8 + Math.floor(Math.random()*8) + eL*2;

  if(isBoss){
    d = Math.round(d*1.6);
    if(Math.random() < 0.25){
      const surge = Math.round(d*1.8);
      const died = applyIncoming(surge);
      log(`<b class="boss-text">${eName} unleashes a devastating surge!</b> -${surge}`, true);
      if(died) quizGate();
      ui();
      return;
    }
  }

  const died = applyIncoming(d);
  log((isBoss ? `${eName} strikes` : 'Enemy hit')+' '+d, true);
  if(died) quizGate();
  ui();
}

function rollCrit(){ return Math.random() < critChance(); }

function move(m){
  if(quizActive) return; // can't act while a quiz is on screen

  let d = 0, crit = false;

  if(m === 'scratch'){
    d = 10 + Math.floor(Math.random()*11) + L*2 + up.atk*2 + strBonus();
    crit = rollCrit();
  }
  if(m === 'fire'){
    if(Math.random() >= fireMissChance()){
      d = 20 + Math.floor(Math.random()*16) + L*2 + up.atk*3 + strBonus();
      crit = rollCrit();
    } else {
      log('Fire Blast missed!');
      enemy(); return;
    }
  }
  if(m === 'heal'){
    const h = 25 + L*2 + up.heal*5 + wisHealBonus();
    HP = Math.min(maxHP(), HP + h);
    log('Heal Pulse restored '+h+' HP');
    ui(); enemy(); return;
  }
  if(m === 'power'){
    if(cool > 0){
      log('Power Strike cooling down!');
      enemy(); return;
    }
    d = 35 + L*3 + up.atk*4 + strBonus();
    crit = rollCrit();
    cool = powerCooldown() + 1;
  }

  if(cool > 0) cool--;
  if(crit) d = Math.round(d*critMultiplier());

  eHP = Math.max(0, eHP - d);
  log(crit ? `Critical hit! You dealt ${d}` : 'You dealt '+d);

  if(eHP <= 0){
    if(isBoss){
      const goldWon = Math.round((60 + eL*20) * goldMultiplier());
      gold += goldWon;
      gain(60 + eL*15);
      log(`<b class="boss-text">${eName} has fallen!</b> Found ${goldWon} gold. Fully healed.`, true);
    } else {
      const goldWon = Math.round((15 + eL*8) * goldMultiplier());
      gold += goldWon;
      gain(25 + eL*10);
      log(`<b>Victory!</b> Found ${goldWon} gold. Fully healed.`, true);
    }
    maybeDropLoot(isBoss);
    defeats++;
    afterVictory();
  } else {
    ui();
    enemy();
  }
}

/* ---------- what happens right after a win ---------- */
function afterVictory(){
  ui();
  if(defeats % BONUS_EVERY === 0){
    setTimeout(bonusQuizGate, 700);
  } else {
    setTimeout(newEnemy, 800);
  }
}

/* ---------- lose-quiz (forces a retry, no reward) ---------- */
function quizGate(){
  quizActive = true;
  const box=document.getElementById('quiz');
  box.style.display='block';
  const x=QUIZ_POOL[Math.floor(Math.random()*QUIZ_POOL.length)];
  document.getElementById('q').textContent=x.q;
  const ans=document.getElementById('ans');
  ans.innerHTML='';
  const order = x.a.map((t,i)=>i);
  for(let i=order.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [order[i],order[j]]=[order[j],order[i]];
  }
  order.forEach(i=>{
    const b=document.createElement('button');
    b.textContent=x.a[i];
    b.onclick=()=>{
      if(i===x.c){
        box.style.display='none';
        quizActive = false;
        newEnemy();
      } else {
        alert('Try again');
      }
    };
    ans.appendChild(b);
  });
  ui();
}

/* ---------- bonus wave-trial quiz (every BONUS_EVERY wins, free upgrade on correct) ---------- */
function bonusQuizGate(){
  quizActive = true;
  const box=document.getElementById('bonusQuiz');
  box.style.display='block';
  const x=QUIZ_POOL[Math.floor(Math.random()*QUIZ_POOL.length)];
  document.getElementById('bq').textContent=x.q;
  const ans=document.getElementById('bqAns');
  ans.innerHTML='';
  const order = x.a.map((t,i)=>i);
  for(let i=order.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [order[i],order[j]]=[order[j],order[i]];
  }
  order.forEach(i=>{
    const b=document.createElement('button');
    b.textContent=x.a[i];
    b.onclick=()=>{
      ans.querySelectorAll('button').forEach(btn=>btn.disabled=true);
      if(i===x.c){
        awardFreeUpgrade();
      } else {
        log('You missed the Wave Trial question — no upgrade this time.', true);
      }
      setTimeout(()=>{
        box.style.display='none';
        quizActive = false;
        newEnemy();
      }, 900);
    };
    ans.appendChild(b);
  });
  ui();
}

function awardFreeUpgrade(){
  // prefer a random non-maxed shop item; fall back to a random stat
  const candidates = SHOP_ITEMS.filter(i => up[i.key] < i.max);
  if(candidates.length > 0){
    const item = candidates[Math.floor(Math.random()*candidates.length)];
    up[item.key] += 1;
    item.apply();
    log(`<b class="bonus-text">Wave Trial passed!</b> Free upgrade: ${item.icon} ${item.name}`, true);
  } else {
    const key = Object.keys(stats)[Math.floor(Math.random()*Object.keys(stats).length)];
    grantFreeStat(key);
    const name = STAT_ITEMS.find(x=>x.key===key).name;
    log(`<b class="bonus-text">Wave Trial passed!</b> Free stat point: ${name}`, true);
  }
  ui();
}

// initial enemy name for the very first fight
eName = ENEMY_NAMES[Math.floor(Math.random()*ENEMY_NAMES.length)];
windCharges = up.wind;
ui();
