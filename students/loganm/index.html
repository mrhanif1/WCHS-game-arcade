<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini Monster Battle GCSE Edition</title>
<style>
body{font-family:Arial,sans-serif;background:#8fd3ff;text-align:center;margin:0}
#game{width:700px;margin:30px auto;background:#fff;border-radius:15px;padding:20px;box-shadow:0 0 15px rgba(0,0,0,.3)}
.monsters{display:flex;justify-content:space-around;margin:20px}
.card{width:260px;background:#eee;padding:15px;border-radius:10px}
.health{height:20px;background:#b00;border-radius:10px;overflow:hidden}
.bar{height:100%;background:#2ecc71;width:100%}
.xpwrap{height:12px;background:#999;border-radius:8px;overflow:hidden}
.xpbar{height:100%;background:#3498db;width:0%}
button{padding:10px 18px;margin:8px}
#quiz{display:none;background:#ffffcc;padding:15px;border-radius:10px}
#log{min-height:60px;font-weight:bold}
</style>
</head>
<body>
<div id="game">
<h1>Mini Monster Battle</h1>
<div class="monsters">
<div class="card">
<h2>Your Monster 🦎</h2>
<div class="health"><div id="playerBar" class="bar"></div></div>
<p>HP: <span id="playerHP"></span>/<span id="maxHP"></span></p>
<p>Level: <span id="level"></span></p>
<p>XP: <span id="xp"></span>/<span id="xpNeed"></span></p>
<div class="xpwrap"><div id="xpBar" class="xpbar"></div></div>
</div>
<div class="card">
<h2>Wild Monster 👾</h2>
<div class="health"><div id="enemyBar" class="bar"></div></div>
<p>HP: <span id="enemyHP"></span>/<span id="enemyMax"></span></p>
<p>Enemy Level: <span id="enemyLevel"></span></p>
</div>
</div>
<button onclick="attack()">Attack</button>
<button onclick="heal()">Heal</button>
<div id="log"></div>
<div id="quiz">
<h2>You Lost!</h2>
<p>Answer correctly to continue.</p>
<h3 id="question"></h3>
<div id="answers"></div>
</div>
</div>
<script>
const questions=[
{q:"What does CPU stand for?",a:["Central Processing Unit","Computer Personal Unit","Central Program Utility","Computer Processing Utility"],c:0},
{q:"Which memory is volatile?",a:["RAM","ROM","SSD","Hard Drive"],c:0},
{q:"What does LAN stand for?",a:["Local Area Network","Large Access Network","Long Area Node","Local Access Node"],c:0},
{q:"Binary uses which two digits?",a:["0 and 1","1 and 2","2 and 3","5 and 6"],c:0},
{q:"What is an algorithm?",a:["A step-by-step set of instructions","Programming language","Storage device","CPU"],c:0}
];
let save=JSON.parse(localStorage.getItem("monsterSave")||"null");
let level=save?.level||1,xp=save?.xp||0,xpNeed=save?.xpNeed||100,maxHP=save?.maxHP||100;
let playerHP=maxHP;
let enemyLevel=level;
let enemyMax=80+enemyLevel*20;
let enemyHP=enemyMax;
function saveGame(){localStorage.setItem("monsterSave",JSON.stringify({level,xp,xpNeed,maxHP}));}
function newEnemy(){enemyLevel=Math.max(1,level+Math.floor(Math.random()*3)-1);enemyMax=80+enemyLevel*20;enemyHP=enemyMax;playerHP=Math.min(playerHP,maxHP);update();}
function update(){
playerHP=Math.max(0,playerHP);enemyHP=Math.max(0,enemyHP);
playerBar.style.width=(playerHP/maxHP*100)+"%";
enemyBar.style.width=(enemyHP/enemyMax*100)+"%";
xpBar.style.width=(xp/xpNeed*100)+"%";
playerHP.textContent=playerHP;maxHP.textContent=maxHP;enemyHP.textContent=enemyHP;enemyMax.textContent=enemyMax;
level.textContent=level;xp.textContent=xp;xpNeed.textContent=xpNeed;enemyLevel.textContent=enemyLevel;
}
function gainXP(a){
xp+=a;log.innerHTML+="<br>Gained "+a+" XP!";
while(xp>=xpNeed){xp-=xpNeed;level++;xpNeed+=50;maxHP+=20;playerHP=maxHP;log.innerHTML+="<br><b>Level Up! Level "+level+"</b>";}
saveGame();update();
}
function attack(){
let dmg=Math.floor(Math.random()*10)+10+level*2;
enemyHP-=dmg;log.innerHTML="You dealt "+dmg+" damage.";update();
if(enemyHP<=0){let reward=25+enemyLevel*10;gainXP(reward);setTimeout(()=>{log.innerHTML+="<br>A new monster appeared!";newEnemy();},800);return;}
enemyTurn();
}
function heal(){
let amt=15+level*2;playerHP=Math.min(maxHP,playerHP+amt);log.innerHTML="You healed "+amt+" HP.";update();enemyTurn();
}
function enemyTurn(){
setTimeout(()=>{let dmg=Math.floor(Math.random()*8)+8+enemyLevel*2;playerHP-=dmg;log.innerHTML+="<br>Enemy dealt "+dmg+" damage.";update();if(playerHP<=0)showQuiz();},500);
}
function showQuiz(){
quiz.style.display="block";
let qu=questions[Math.floor(Math.random()*questions.length)];
window.current=qu;question.textContent=qu.q;
answers.innerHTML="";
qu.a.forEach((ans,i)=>{let b=document.createElement("button");b.textContent=ans;b.onclick=()=>answer(i);answers.appendChild(b);answers.appendChild(document.createElement("br"));});
}
function answer(i){
if(i===current.c){alert("Correct!");quiz.style.display="none";playerHP=maxHP;newEnemy();log.innerHTML="Battle restarted.";}
else{alert("Incorrect.");showQuiz();}
}
update();
</script>
</body>
</html>
