<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mini Monster Battle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#180f2b;
    --card:#241a3d;
    --card2:#2f2350;
    --line:#3d2e63;
    --gold:#d9a441;
    --gold-dim:#8a6a2c;
    --ember:#ff6b45;
    --cream:#f3e7d0;
    --dim:#b8a9d6;
    --hp:#49b578;
    --hp-low:#d9534f;
    --xp:#5b8dee;
    --enemy:#d9534f;
    --boss:#c2185b;
    --boss-glow:#ff2e63;
    --stat:#7c5cff;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:'Inter',Arial,sans-serif;
    background:
      radial-gradient(circle at 20% 10%, #2a1c4a 0%, transparent 45%),
      radial-gradient(circle at 85% 80%, #1f2f5a 0%, transparent 40%),
      var(--bg);
    color:var(--cream);
    min-height:100vh;
    padding:24px 12px;
  }
  #game{
    max-width:760px;
    margin:0 auto;
    background:linear-gradient(180deg,var(--card),var(--card2));
    border:1px solid var(--line);
    border-radius:16px;
    padding:24px 28px 30px;
    box-shadow:0 20px 60px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.03);
    transition:box-shadow .4s ease, border-color .4s ease;
  }
  #game.boss-mode{
    border-color:var(--boss);
    box-shadow:0 20px 60px rgba(194,24,91,.35), inset 0 1px 0 rgba(255,255,255,.03);
  }
  h1{
    font-family:'Cinzel',serif;
    font-weight:900;
    letter-spacing:.03em;
    text-align:center;
    margin:0 0 4px;
    font-size:2rem;
    color:var(--gold);
    text-shadow:0 2px 12px rgba(217,164,65,.25);
  }
  .sub{
    text-align:center;
    color:var(--dim);
    font-size:.85rem;
    margin:0 0 20px;
    letter-spacing:.08em;
    text-transform:uppercase;
  }
  .row{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:6px}
  .statline{font-size:.95rem;color:var(--dim)}
  .statline b{color:var(--cream)}
  .gold-badge{
    display:inline-flex;align-items:center;gap:6px;
    background:rgba(217,164,65,.12);
    border:1px solid var(--gold-dim);
    color:var(--gold);
    padding:4px 12px;
    border-radius:999px;
    font-weight:600;
    font-size:.9rem;
  }
  .bar{background:#140c26;height:16px;border-radius:8px;overflow:hidden;border:1px solid var(--line);margin:4px 0 14px}
  .bar .fill{height:100%;transition:width .35s ease}
  .fill.hp{background:linear-gradient(90deg,var(--hp),#7fe0a4)}
  .fill.hp.low{background:linear-gradient(90deg,var(--hp-low),#f08a86)}
  .fill.xp{background:linear-gradient(90deg,var(--xp),#8fb4f5)}
  .fill.enemy{background:linear-gradient(90deg,var(--enemy),#f08a86)}
  .fill.boss{background:linear-gradient(90deg,var(--boss),var(--boss-glow));}
  .bar.boss-bar{border-color:var(--boss);box-shadow:0 0 14px rgba(255,46,99,.35);animation:pulseBar 1.6s ease-in-out infinite}
  @keyframes pulseBar{0%,100%{box-shadow:0 0 8px rgba(255,46,99,.25)}50%{box-shadow:0 0 18px rgba(255,46,99,.55)}}

  .enemy-head{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
  .boss-tag{
    display:none;
    align-items:center;gap:6px;
    background:linear-gradient(90deg,var(--boss),#7a1030);
    color:#ffe1ec;
    font-family:'Cinzel',serif;
    font-weight:700;
    font-size:.72rem;
    letter-spacing:.08em;
    padding:3px 10px;
    border-radius:999px;
    text-transform:uppercase;
  }
  .boss-tag.show{display:inline-flex}
  .next-boss{font-size:.72rem;color:var(--dim);opacity:.85}

  .panel-title{
    font-family:'Cinzel',serif;
    color:var(--gold);
    font-size:1rem;
    margin:0 0 8px;
    border-bottom:1px solid var(--line);
    padding-bottom:6px;
  }
  .shop-cat{
    font-size:.7rem;
    color:var(--dim);
    text-transform:uppercase;
    letter-spacing:.1em;
    margin:14px 0 2px;
  }
  .shop-cat:first-of-type{margin-top:0}
  .moves{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:14px 0}
  button{
    font-family:'Inter',sans-serif;
    font-weight:600;
    cursor:pointer;
    border-radius:10px;
    border:1px solid var(--line);
    background:#1c1433;
    color:var(--cream);
    padding:12px 10px;
    font-size:.92rem;
    transition:transform .12s ease, border-color .12s ease, background .12s ease;
  }
  button:hover:not(:disabled){border-color:var(--gold-dim);background:#241a44;transform:translateY(-1px)}
  button:active:not(:disabled){transform:translateY(0)}
  button:disabled{opacity:.4;cursor:not-allowed}
  .move-name{display:block;font-weight:700}
  .move-desc{display:block;font-size:.72rem;color:var(--dim);margin-top:2px;font-weight:400}
  #shopToggle{
    width:100%;
    background:linear-gradient(90deg,var(--ember),#c94a2a);
    border:none;color:#1a0e08;font-family:'Cinzel',serif;font-weight:700;
    letter-spacing:.04em;padding:12px;font-size:1rem;
  }
  #shopToggle:hover{filter:brightness(1.08)}

  #panelWrap{
    display:none;
    margin-top:16px;
  }
  .tabs{display:flex;gap:8px;margin-bottom:12px}
  .tab-btn{
    flex:1;
    background:#1c1433;
    border:1px solid var(--line);
    padding:10px;
    font-family:'Cinzel',serif;
    font-weight:700;
    font-size:.85rem;
    letter-spacing:.03em;
    color:var(--dim);
  }
  .tab-btn.active{
    color:#1a0e08;
    background:linear-gradient(90deg,var(--gold),#f0c675);
    border-color:var(--gold);
  }
  .tab-panel{display:none}
  .tab-panel.active{display:block}

  #stats{
    background:#150d29;
    border:1px solid var(--stat);
    border-radius:12px;
    padding:16px;
  }
  .stat-item{
    display:flex;justify-content:space-between;align-items:center;gap:12px;
    padding:12px 4px;
    border-bottom:1px solid var(--line);
  }
  .stat-item:last-child{border-bottom:none}
  .stat-item .info{flex:1}
  .stat-item .name{font-weight:700;color:var(--cream)}
  .stat-item .desc{font-size:.78rem;color:var(--dim);margin-top:2px}
  .stat-item .lvl{font-size:.72rem;color:var(--stat);margin-top:2px;font-weight:600}
  .stat-btn{
    background:var(--stat);
    color:#fff;
    border:none;
    min-width:92px;
    font-weight:700;
  }
  .stat-btn:hover:not(:disabled){filter:brightness(1.12);transform:translateY(-1px)}

  #shop{
    display:block;
    background:#150d29;
    border:1px solid var(--gold-dim);
    border-radius:12px;
    padding:16px;
    max-height:420px;
    overflow-y:auto;
  }
  .shop-item{
    display:flex;justify-content:space-between;align-items:center;gap:12px;
    padding:10px 4px;
    border-bottom:1px solid var(--line);
  }
  .shop-item:last-child{border-bottom:none}
  .shop-item .info{flex:1}
  .shop-item .name{font-weight:700;color:var(--cream)}
  .shop-item .desc{font-size:.78rem;color:var(--dim);margin-top:2px}
  .shop-item .lvl{font-size:.72rem;color:var(--gold);margin-top:2px}
  .buy-btn{
    background:var(--gold);
    color:#231604;
    border:none;
    min-width:92px;
    font-weight:700;
  }
  .buy-btn:hover:not(:disabled){filter:brightness(1.08);transform:translateY(-1px)}
  #log{
    margin-top:16px;
    background:#120b22;
    border:1px solid var(--line);
    border-radius:10px;
    padding:12px 14px;
    min-height:52px;
    font-size:.9rem;
    color:var(--dim);
    line-height:1.5;
  }
  #log b{color:var(--gold)}
  #log b.boss-text{color:var(--boss-glow)}
  #log b.wind-text{color:var(--hp)}
  #log b.dodge-text{color:var(--stat)}
  #quiz{
    display:none;
    margin-top:16px;
    background:#150d29;
    border:1px solid var(--ember);
    border-radius:12px;
    padding:16px;
    text-align:center;
  }
  #quiz h3{font-family:'Cinzel',serif;color:var(--ember);margin:0 0 8px}
  #ans button{margin:4px}
  .flash{animation:flash .4s ease}
  @keyframes flash{0%{filter:brightness(1.6)}100%{filter:brightness(1)}}

  #bossBanner{
    display:none;
    text-align:center;
    font-family:'Cinzel',serif;
    font-weight:900;
    letter-spacing:.06em;
    color:var(--boss-glow);
    text-shadow:0 0 18px rgba(255,46,99,.5);
    font-size:1.1rem;
    margin:0 0 10px;
    text-transform:uppercase;
    animation:bannerIn .5s ease;
  }
  #bossBanner.show{display:block}
  @keyframes bannerIn{
    0%{opacity:0;transform:translateY(-6px) scale(.96)}
    100%{opacity:1;transform:translateY(0) scale(1)}
  }
</style>
</head>
<body>
<div id="game">
  <h1>Mini Monster Battle</h1>
  <p class="sub">A tiny turn-based skirmish</p>

  <div class="row">
    <span class="statline">Level <b id="lvl"></b> &nbsp;|&nbsp; XP <b id="xp"></b>/<b id="need"></b></span>
    <span class="gold-badge">&#9830; <span id="gold"></span> gold</span>
  </div>
  <div class="bar"><div id="xpfill" class="fill xp"></div></div>

  <p class="statline">Your HP <b id="php"></b>/<b id="mhp"></b> <span id="windTag" style="display:none;color:var(--hp);font-size:.78rem">&#9889; <span id="windCount"></span> Second Wind</span></p>
  <div class="bar"><div id="pfill" class="fill hp"></div></div>

  <div id="bossBanner">&#9760; A Boss Approaches &#9760;</div>

  <div class="enemy-head">
    <p class="statline">
      <span id="bossTag" class="boss-tag">&#128128; Boss</span>
      <span id="enemyName"></span> &middot; Lv <b id="elv"></b> &nbsp; HP <b id="ehp"></b>/<b id="emhp"></b>
    </p>
    <span class="next-boss" id="nextBoss"></span>
  </div>
  <div class="bar" id="ebar"><div id="efill" class="fill enemy"></div></div>

  <div class="moves">
    <button onclick="move('scratch')">
      <span class="move-name">Scratch</span>
      <span class="move-desc" id="d-scratch"></span>
    </button>
    <button onclick="move('fire')">
      <span class="move-name">Fire Blast</span>
      <span class="move-desc" id="d-fire"></span>
    </button>
    <button onclick="move('heal')">
      <span class="move-name">Heal Pulse</span>
      <span class="move-desc" id="d-heal"></span>
    </button>
    <button onclick="move('power')" id="powerBtn">
      <span class="move-name">Power Strike</span>
      <span class="move-desc" id="d-power"></span>
    </button>
  </div>

  <button id="shopToggle" onclick="togglePanel()">&#9878; Open Character Menu</button>

  <div id="panelWrap">
    <div class="tabs">
      <button class="tab-btn active" id="tabStatsBtn" onclick="switchTab('stats')">&#9876; Stats</button>
      <button class="tab-btn" id="tabShopBtn" onclick="switchTab('shop')">&#9878; Shop</button>
    </div>

    <div class="tab-panel active" id="tabStats">
      <div id="stats"></div>
    </div>

    <div class="tab-panel" id="tabShop">
      <div id="shop"></div>
    </div>
  </div>

  <div id="log">Your adventure begins&hellip;</div>

  <div id="quiz">
    <h3>Answer to continue</h3>
    <p id="q"></p>
    <div id="ans"></div>
  </div>
</div>

<script>
const QUIZ_POOL=[
  {q:'CPU stands for?',a:['Central Processing Unit','Computer Personal Unit','Core Processor Utility','Central Program Unit'],c:0},
  {q:'RAM is best described as?',a:['Long-term storage','Short-term working memory','A type of screen','A type of cable'],c:1},
  {q:'HTML stands for?',a:['HyperText Markup Language','High Tech Modern Language','Home Tool Markup Language','HyperTransfer Machine Language'],c:0},
  {q:'What does "www" stand for?',a:['World Wide Web','World Wide Wire','Web Wide World','Wide World Web'],c:0},
  {q:'A byte is made up of how many bits?',a:['4','8','16','2'],c:1},
  {q:'Which of these is an operating system?',a:['Photoshop','Linux','Excel','Chrome'],c:1},
  {q:'What does "URL" stand for?',a:['Uniform Resource Locator','Universal Reference Link','User Response Load','Unified Recovery Line'],c:0},
  {q:'Which company created the JavaScript language?',a:['Microsoft','Netscape','Apple','IBM'],c:1},
  {q:'What does "GPU" primarily process?',a:['Sound','Graphics','Network packets','File storage'],c:1},
  {q:'A firewall is used to?',a:['Cool down a computer','Filter network traffic','Speed up the CPU','Store backups'],c:1}
];

const BOSS_EVERY = 5; // a boss shows up after every 5 normal victories
const BOSS_NAMES = [
  'Grimwald the Ashen',
  'Vex, Herald of Ruin',
  'The Hollow Sovereign',
  'Karrath Deepfang',
  'Nyxara the Unbound',
  'The Cindered Wyrm',
  'Mordrec, Last Warden'
];
const ENEMY_NAMES = ['Snarling Whelp','Marsh Stalker','Cave Skitterling','Rot Hound','Ember Imp','Fen Wraith'];

/* ---------- save / state ---------- */
let s = JSON.parse(localStorage.getItem('mbsave') || '{}');
let L = s.L || 1, XP = s.XP || 0, N = s.N || 100, M = s.M || 100;
let gold = s.gold || 0;
let up = Object.assign({atk:0, hp:0, heal:0, cool:0, crit:0, armor:0, luck:0, wind:0, focus:0, swift:0}, s.up || {});
let stats = Object.assign({str:0, vit:0, agi:0, wis:0}, s.stats || {});
let HP = (s.HP !== undefined ? s.HP : M);
let defeats = s.defeats || 0;
let cool = 0;
let windCharges = 0;

let eL = L, eM = 80 + eL*20, eHP = eM, eName = ENEMY_NAMES[0], isBoss = false;

/* ---------- core stat system ---------- */
const STAT_ITEMS = [
  {
    key:'str', name:'Strength', icon:'&#128170;',
    desc:'Adds +2 damage to every attack move per point.'
  },
  {
    key:'vit', name:'Vitality', icon:'&#10084;',
    desc:'Adds +10 max HP per point and heals you fully on purchase.'
  },
  {
    key:'agi', name:'Agility', icon:'&#127939;',
    desc:'Adds +2% critical hit chance and +1% dodge chance per point.'
  },
  {
    key:'wis', name:'Wisdom', icon:'&#128302;',
    desc:'Adds +5 Heal Pulse power and +2% gold gain per point.'
  }
];

function statCost(key){
  const lvl = stats[key];
  return Math.round(20 * Math.pow(1.15, lvl));
}

function buyStat(key){
  const cost = statCost(key);
  if(gold < cost) return;
  gold -= cost;
  stats[key] += 1;
  if(key === 'vit'){ M += 10; HP = M; }
  log(`Trained <b>${STAT_ITEMS.find(x=>x.key===key).name}</b>!`, true);
  ui();
}

/* ---------- shop items (gear) ---------- */
const SHOP_ITEMS = [
  {
    key:'atk', name:'Sharpen Claws', icon:'&#9876;', cat:'Offense',
    desc:'Adds raw power to every attack move.',
    baseCost:25, step:18, max:10,
    apply:()=>{}
  },
  {
    key:'crit', name:'Critical Focus', icon:'&#127919;', cat:'Offense',
    desc:'+5% chance for any attack to land a critical hit.',
    baseCost:35, step:28, max:5,
    apply:()=>{}
  },
  {
    key:'focus', name:'Focused Mind', icon:'&#128301;', cat:'Offense',
    desc:'Increases critical hit damage multiplier by 0.1x.',
    baseCost:45, step:35, max:5,
    apply:()=>{}
  },
  {
    key:'swift', name:'Swift Strikes', icon:'&#128168;', cat:'Offense',
    desc:'Reduces Fire Blast\'s miss chance by 5%.',
    baseCost:40, step:30, max:4,
    apply:()=>{}
  },
  {
    key:'hp', name:'Vitality Charm', icon:'&#10084;', cat:'Defense',
    desc:'Permanently raises max HP by 15 and heals you fully.',
    baseCost:30, step:22, max:10,
    apply:()=>{ M += 15; HP = M; }
  },
  {
    key:'armor', name:'Iron Skin', icon:'&#128737;', cat:'Defense',
    desc:'Reduces all incoming damage by 3%.',
    baseCost:38, step:32, max:5,
    apply:()=>{}
  },
  {
    key:'wind', name:'Second Wind Talisman', icon:'&#9889;', cat:'Defense',
    desc:'Survive a killing blow with 1 HP. Recharges every fight.',
    baseCost:80, step:100, max:2,
    apply:()=>{}
  },
  {
    key:'heal', name:'Healing Amplifier', icon:'&#10024;', cat:'Support',
    desc:'Makes Heal Pulse restore much more HP.',
    baseCost:22, step:16, max:10,
    apply:()=>{}
  },
  {
    key:'cool', name:'Quick Recovery', icon:'&#9201;', cat:'Support',
    desc:'Reduces Power Strike\'s cooldown by 1 turn.',
    baseCost:60, step:70, max:2,
    apply:()=>{}
  },
  {
    key:'luck', name:'Lucky Coin', icon:'&#127183;', cat:'Support',
    desc:'Increases gold earned from victories by 10%.',
    baseCost:35, step:25, max:5,
    apply:()=>{}
  }
];

function costOf(item){ return item.baseCost + up[item.key]*item.step; }
function powerCooldown(){ return Math.max(0, 2 - up.cool); }
function critChance(){ return up.crit * 0.05 + stats.agi * 0.02; }
function critMultiplier(){ return 1.5 + up.focus * 0.1; }
function armorReduction(){ return Math.min(0.6, up.armor * 0.03); }
function dodgeChance(){ return Math.min(0.5, stats.agi * 0.01); }
function goldMultiplier(){ return 1 + up.luck * 0.1 + stats.wis * 0.02; }
function fireMissChance(){ return Math.max(0, 0.2 - up.swift * 0.05); }
function strBonus(){ return stats.str; }
function wisHealBonus(){ return stats.wis * 5; }

function save(){
  localStorage.setItem('mbsave', JSON.stringify({L,XP,N,M,gold,up,stats,HP,defeats}));
}

/* ---------- UI ---------- */
function ui(){
  lvl.textContent=L; xp.textContent=XP; need.textContent=N;
  mhp.textContent=M; php.textContent=HP;
  elv.textContent=eL; emhp.textContent=eM; ehp.textContent=eHP;
  document.getElementById('gold').textContent = gold;
  document.getElementById('enemyName').textContent = eName;

  pfill.style.width = (HP/M*100)+'%';
  pfill.classList.toggle('low', HP/M < 0.3);
  efill.style.width = (eHP/eM*100)+'%';
  xpfill.style.width = (XP/N*100)+'%';

  document.getElementById('windTag').style.display = up.wind>0 ? 'inline' : 'none';
  document.getElementById('windCount').textContent = windCharges;

  // boss visuals
  document.getElementById('game').classList.toggle('boss-mode', isBoss);
  document.getElementById('bossBanner').classList.toggle('show', isBoss);
  document.getElementById('bossTag').classList.toggle('show', isBoss);
  document.getElementById('ebar').classList.toggle('boss-bar', isBoss);
  efill.classList.toggle('boss', isBoss);
  efill.classList.toggle('enemy', !isBoss);

  const untilBoss = isBoss ? 0 : (BOSS_EVERY - (defeats % BOSS_EVERY));
  document.getElementById('nextBoss').textContent = isBoss
    ? ''
    : `Next boss in ${untilBoss} win${untilBoss===1?'':'s'}`;

  document.getElementById('d-scratch').textContent = `~${10+L*2+up.atk*2+strBonus()}-${20+L*2+up.atk*2+strBonus()} dmg`;
  document.getElementById('d-fire').textContent = `~${20+L*2+up.atk*3+strBonus()}-${35+L*2+up.atk*3+strBonus()} dmg (${Math.round((1-fireMissChance())*100)}%)`;
  document.getElementById('d-heal').textContent = `+${25+L*2+up.heal*5+wisHealBonus()} HP`;
  document.getElementById('d-power').textContent = cool>0
    ? `cooling down (${cool})`
    : `${35+L*3+up.atk*4+strBonus()} dmg, ${powerCooldown()} turn CD`;
  powerBtn.disabled = cool>0;

  renderStats();
  renderShop();
  save();
}

function log(msg, append){
  const el=document.getElementById('log');
  el.innerHTML = append ? el.innerHTML+'<br>'+msg : msg;
  el.classList.remove('flash'); void el.offsetWidth; el.classList.add('flash');
}

/* ---------- panel / tabs ---------- */
function togglePanel(){
  const el=document.getElementById('panelWrap');
  const open = el.style.display==='block';
  el.style.display = open ? 'none' : 'block';
  document.getElementById('shopToggle').innerHTML = open
    ? "&#9878; Open Character Menu"
    : "&#9878; Close Character Menu";
  if(!open){ renderStats(); renderShop(); }
}

function switchTab(name){
  const isStats = name==='stats';
  document.getElementById('tabStats').classList.toggle('active', isStats);
  document.getElementById('tabShop').classList.toggle('active', !isStats);
  document.getElementById('tabStatsBtn').classList.toggle('active', isStats);
  document.getElementById('tabShopBtn').classList.toggle('active', !isStats);
  if(isStats) renderStats(); else renderShop();
}

/* ---------- stats panel ---------- */
function renderStats(){
  const el=document.getElementById('stats');
  if(document.getElementById('panelWrap').style.display!=='block') return;
  if(!document.getElementById('tabStats').classList.contains('active')) return;
  el.innerHTML='<div class="panel-title">Hero Stats</div>';
  STAT_ITEMS.forEach(item=>{
    const lvl = stats[item.key];
    const cost = statCost(item.key);
    const div=document.createElement('div');
    div.className='stat-item';
    div.innerHTML = `
      <div class="info">
        <div class="name">${item.icon} ${item.name}</div>
        <div class="desc">${item.desc}</div>
        <div class="lvl">Level: ${lvl}</div>
      </div>
    `;
    const btn=document.createElement('button');
    btn.className='stat-btn';
    btn.textContent = `Train (${cost}\u2666)`;
    btn.disabled = gold < cost;
    btn.onclick = ()=> buyStat(item.key);
    div.appendChild(btn);
    el.appendChild(div);
  });
}

/* ---------- shop panel ---------- */
function renderShop(){
  const el=document.getElementById('shop');
  if(document.getElementById('panelWrap').style.display!=='block') return;
  if(!document.getElementById('tabShop').classList.contains('active')) return;
  el.innerHTML='<div class="panel-title">Merchant\'s Shop</div>';
  let lastCat = null;
  SHOP_ITEMS.forEach(item=>{
    if(item.cat !== lastCat){
      const catEl = document.createElement('div');
      catEl.className = 'shop-cat';
      catEl.textContent = item.cat;
      el.appendChild(catEl);
      lastCat = item.cat;
    }
    const lvlCount = up[item.key];
    const maxed = lvlCount >= item.max;
    const cost = costOf(item);
    const div=document.createElement('div');
    div.className='shop-item';
    div.innerHTML = `
      <div class="info">
        <div class="name">${item.icon} ${item.name}</div>
        <div class="desc">${item.desc}</div>
        <div class="lvl">Owned: ${lvlCount}/${item.max}</div>
      </div>
    `;
    const btn=document.createElement('button');
    btn.className='buy-btn';
    btn.textContent = maxed ? 'Maxed' : `Buy (${cost}\u2666)`;
    btn.disabled = maxed || gold < cost;
    btn.onclick = ()=> buy(item);
    div.appendChild(btn);
    el.appendChild(div);
  });
}

function buy(item){
  const cost = costOf(item);
  if(up[item.key] >= item.max || gold < cost) return;
  gold -= cost;
  up[item.key] += 1;
  item.apply();
  log(`Purchased <b>${item.name}</b>!`, true);
  ui();
}

/* ---------- battle ---------- */
function gain(v){
  XP += v;
  while(XP >= N){
    XP -= N; L++; N += 50; M += 20; HP = M;
    log('<b>Level Up!</b>', true);
  }
  ui();
}

function newEnemy(){
  HP = M;
  cool = 0;
  windCharges = up.wind;

  const nextIsBoss = defeats > 0 && defeats % BOSS_EVERY === 0;
  isBoss = nextIsBoss;

  if(isBoss){
    eL = L + 2;
    eM = 150 + eL*40;
    eName = BOSS_NAMES[Math.floor(defeats/BOSS_EVERY - 1) % BOSS_NAMES.length];
    log(`<b class="boss-text">${eName} emerges from the shadows!</b>`);
  } else {
    eL = Math.max(1, L + Math.floor(Math.random()*3) - 1);
    eM = 80 + eL*20;
    eName = ENEMY_NAMES[Math.floor(Math.random()*ENEMY_NAMES.length)];
  }
  eHP = eM;
  ui();
}

function applyIncoming(rawDamage){
  const reduced = Math.round(rawDamage * (1 - armorReduction()));
  const wouldDie = (HP - reduced) <= 0;
  if(wouldDie && windCharges > 0){
    windCharges--;
    HP = 1;
    log(`<b class="wind-text">Your Second Wind Talisman flares, keeping you standing at 1 HP!</b>`, true);
    return false; // did not actually die
  }
  HP = Math.max(0, HP - reduced);
  return HP <= 0;
}

function enemy(){
  if(eHP <= 0) return;

  if(Math.random() < dodgeChance()){
    log(`<b class="dodge-text">You dodge the attack!</b>`, true);
    ui();
    return;
  }

  let d = 8 + Math.floor(Math.random()*8) + eL*2;

  if(isBoss){
    d = Math.round(d*1.6);
    if(Math.random() < 0.25){
      const surge = Math.round(d*1.8);
      const died = applyIncoming(surge);
      log(`<b class="boss-text">${eName} unleashes a devastating surge!</b> -${surge}`, true);
      if(died) quizGate();
      ui();
      return;
    }
  }

  const died = applyIncoming(d);
  log((isBoss ? `${eName} strikes` : 'Enemy hit')+' '+d, true);
  if(died) quizGate();
  ui();
}

function rollCrit(){ return Math.random() < critChance(); }

function move(m){
  let d = 0, crit = false;

  if(m === 'scratch'){
    d = 10 + Math.floor(Math.random()*11) + L*2 + up.atk*2 + strBonus();
    crit = rollCrit();
  }
  if(m === 'fire'){
    if(Math.random() >= fireMissChance()){
      d = 20 + Math.floor(Math.random()*16) + L*2 + up.atk*3 + strBonus();
      crit = rollCrit();
    } else {
      log('Fire Blast missed!');
      enemy(); return;
    }
  }
  if(m === 'heal'){
    const h = 25 + L*2 + up.heal*5 + wisHealBonus();
    HP = Math.min(M, HP + h);
    log('Heal Pulse restored '+h+' HP');
    ui(); enemy(); return;
  }
  if(m === 'power'){
    if(cool > 0){
      log('Power Strike cooling down!');
      enemy(); return;
    }
    d = 35 + L*3 + up.atk*4 + strBonus();
    crit = rollCrit();
    cool = powerCooldown() + 1;
  }

  if(cool > 0) cool--;
  if(crit) d = Math.round(d*critMultiplier());

  eHP = Math.max(0, eHP - d);
  log(crit ? `Critical hit! You dealt ${d}` : 'You dealt '+d);

  if(eHP <= 0){
    if(isBoss){
      const goldWon = Math.round((60 + eL*20) * goldMultiplier());
      gold += goldWon;
      gain(60 + eL*15);
      log(`<b class="boss-text">${eName} has fallen!</b> Found ${goldWon} gold. Fully healed.`, true);
      defeats++;
      setTimeout(newEnemy, 900);
    } else {
      const goldWon = Math.round((15 + eL*8) * goldMultiplier());
      gold += goldWon;
      gain(25 + eL*10);
      log(`<b>Victory!</b> Found ${goldWon} gold. Fully healed.`, true);
      defeats++;
      setTimeout(newEnemy, 800);
    }
  } else {
    ui();
    enemy();
  }
}

function quizGate(){
  const box=document.getElementById('quiz');
  box.style.display='block';
  const x=QUIZ_POOL[Math.floor(Math.random()*QUIZ_POOL.length)];
  document.getElementById('q').textContent=x.q;
  const ans=document.getElementById('ans');
  ans.innerHTML='';
  // shuffle answer order so the correct index isn't always in the same spot
  const order = x.a.map((t,i)=>i);
  for(let i=order.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [order[i],order[j]]=[order[j],order[i]];
  }
  order.forEach(i=>{
    const b=document.createElement('button');
    b.textContent=x.a[i];
    b.onclick=()=>{
      if(i===x.c){ box.style.display='none'; newEnemy(); }
      else alert('Try again');
    };
    ans.appendChild(b);
  });
}

// initial enemy name for the very first fight
eName = ENEMY_NAMES[Math.floor(Math.random()*ENEMY_NAMES.length)];
windCharges = up.wind;
ui();
</script>
