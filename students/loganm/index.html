<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Monster Battle</title>
<style>
body{font-family:Arial;background:#8fd3ff;text-align:center}#game{max-width:760px;margin:20px auto;background:#fff;padding:20px;border-radius:12px}.health,.xp{background:#999;height:18px;border-radius:9px;overflow:hidden}.fill{background:#2ecc71;height:100%}.xp .fill{background:#3498db}button{margin:5px;padding:10px}
</style></head><body><div id='game'>
<h1>Mini Monster Battle</h1>
<p>Level <span id=lvl></span> | XP <span id=xp></span>/<span id=need></span></p>
<div class='xp'><div id=xpfill class='fill'></div></div>
<p>Your HP <span id=php></span>/<span id=mhp></span></p><div class='health'><div id=pfill class='fill'></div></div>
<p>Enemy Lv <span id=elv></span> HP <span id=ehp></span>/<span id=emhp></span></p><div class='health'><div id=efill class='fill'></div></div>
<div>
<button onclick="move('scratch')">Scratch</button>
<button onclick="move('fire')">Fire Blast</button>
<button onclick="move('heal')">Heal Pulse</button>
<button onclick="move('power')">Power Strike</button>
</div><div id=log></div>
<div id=quiz style='display:none'><h3>Answer to continue</h3><p id=q></p><div id=ans></div></div>
</div><script>
const qs=[{q:'CPU stands for?',a:['Central Processing Unit','Computer Personal Unit'],c:0}];
let s=JSON.parse(localStorage.getItem('mbsave')||'{}');
let L=s.L||1,XP=s.XP||0,N=s.N||100,M=s.M||100,HP=M,cool=0;
let eL=L,eM=80+eL*20,eHP=eM;
function save(){localStorage.setItem('mbsave',JSON.stringify({L,XP,N,M}))}
function ui(){lvl.textContent=L;xp.textContent=XP;need.textContent=N;mhp.textContent=M;php.textContent=HP;elv.textContent=eL;emhp.textContent=eM;ehp.textContent=eHP;pfill.style.width=HP/M*100+'%';efill.style.width=eHP/eM*100+'%';xpfill.style.width=XP/N*100+'%'}
function gain(v){XP+=v;while(XP>=N){XP-=N;L++;N+=50;M+=20;HP=M;log.innerHTML+='<br><b>Level Up!</b>';}save();ui();}
function newEnemy(){HP=M;eL=Math.max(1,L+Math.floor(Math.random()*3)-1);eM=80+eL*20;eHP=eM;cool=0;ui();}
function enemy(){if(eHP<=0)return;let d=8+Math.floor(Math.random()*8)+eL*2;HP=Math.max(0,HP-d);log.innerHTML+='<br>Enemy hit '+d;if(HP<=0)quiz();ui();}
function move(m){let d=0;
if(m=='scratch')d=10+Math.floor(Math.random()*11)+L*2;
if(m=='fire'){if(Math.random()<0.8)d=20+Math.floor(Math.random()*16)+L*2;else{log.innerHTML='Fire Blast missed!';enemy();return;}}
if(m=='heal'){HP=Math.min(M,HP+25+L*2);log.innerHTML='Heal Pulse restored HP';ui();enemy();return;}
if(m=='power'){if(cool>0){log.innerHTML='Power Strike cooling down!';enemy();return;}d=35+L*3;cool=2;}
if(cool>0)cool--;
eHP=Math.max(0,eHP-d);log.innerHTML='You dealt '+d;
if(eHP<=0){gain(25+eL*10);log.innerHTML+='<br>Victory! Fully healed.';setTimeout(newEnemy,800);} else {ui();enemy();}}
function quiz(){quiz.style.display='block';let x=qs[0];q.textContent=x.q;ans.innerHTML='';x.a.forEach((t,i)=>{let b=document.createElement('button');b.textContent=t;b.onclick=()=>{if(i==x.c){quiz.style.display='none';newEnemy();}else alert('Try again');};ans.appendChild(b);});}
ui();
</script></body></html>
