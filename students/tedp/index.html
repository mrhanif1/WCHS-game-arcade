<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0f172a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: #1e293b;
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 16px;
            padding: 35px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,.35);
        }

        .icon {
            font-size: 55px;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 12px;
        }

        p {
            color: #cbd5e1;
            line-height: 1.6;
            margin-bottom: 18px;
        }

        .countdown {
            font-size: 2.5rem;
            font-weight: bold;
            color: #38bdf8;
            margin: 20px 0;
        }

        .progress {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,.08);
            border-radius: 999px;
            overflow: hidden;
            margin-bottom: 25px;
        }

        .progress-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #38bdf8, #2563eb);
            animation: progress 5s linear forwards;
        }

        @keyframes progress {
            from {
                width: 100%;
            }
            to {
                width: 0%;
            }
        }

        a.button {
            display: inline-block;
            background: #2563eb;
            color: white;
            text-decoration: none;
            padding: 12px 22px;
            border-radius: 10px;
            font-weight: 600;
            transition: .2s;
        }

        a.button:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }

        .small {
            margin-top: 18px;
            font-size: .9rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon">🔄</div>

    <h1>Site Updated</h1>

    <p>
        This website has moved to a newer version.
        You will be redirected automatically in:
    </p>

    <div class="countdown" id="countdown">5</div>

    <div class="progress">
        <div class="progress-bar"></div>
    </div>

    <a class="button" href="https://project-liard-delta-10.vercel.app/">
        Go to the New Site
    </a>

    <p class="small">
        If you aren't redirected automatically, click the button above.
    </p>
</div>

<script>
    const url = "https://project-liard-delta-10.vercel.app/";
    let seconds = 5;

    const countdown = document.getElementById("countdown");

    const timer = setInterval(() => {
        seconds--;
        countdown.textContent = seconds;

        if (seconds <= 0) {
            clearInterval(timer);
            window.location.replace(url);
        }
    }, 1000);
</script>

</body>
</html>
